# Databases for the explain/ integration tests.
#
#   docker compose -f test/integration/docker-compose.yml up -d --wait
#   make test-integration
#   docker compose -f test/integration/docker-compose.yml down -v
#
# Host ports are deliberately non-default so this never collides with a
# database you already run locally.

services:
  postgres:
    image: postgres:18.3-alpine
    environment:
      POSTGRES_USER: sqlguard
      POSTGRES_PASSWORD: sqlguard
      POSTGRES_DB: sqlguard
    ports:
      - "55432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sqlguard -d sqlguard"]
      interval: 2s
      timeout: 5s
      retries: 30

  mysql:
    image: mysql:9.7.1
    environment:
      MYSQL_ROOT_PASSWORD: sqlguard
      MYSQL_DATABASE: sqlguard
    ports:
      - "53306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-psqlguard"]
      interval: 2s
      timeout: 5s
      retries: 30

  mariadb:
    image: mariadb:12.3.2
    environment:
      MARIADB_ROOT_PASSWORD: sqlguard
      MARIADB_DATABASE: sqlguard
    ports:
      - "53307:3306"
    healthcheck:
      test: ["CMD", "mariadb-admin", "ping", "-h", "127.0.0.1", "-uroot", "-psqlguard"]
      interval: 2s
      timeout: 5s
      retries: 30
