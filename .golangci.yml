version: "2"

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
    - ineffassign
    - misspell
    - gocritic
    - gocyclo
    - revive
    - prealloc
  settings:
    gocyclo:
      min-complexity: 15
    revive:
      rules:
        - name: exported
  exclusions:
    rules:
      - linters:
          - errcheck
        path: _test\.go

formatters:
  enable:
    - gofmt
    - goimports
