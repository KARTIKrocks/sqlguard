# Codecov configuration for sqlguard.
# Docs: https://docs.codecov.com/docs/codecov-yaml
# Coverage is produced by `make coverage` (merged across all nine modules) and
# uploaded from the CI "coverage" job.

codecov:
  require_ci_to_pass: true

coverage:
  precision: 2
  round: down
  range: "70...100"
  status:
    project:
      default:
        target: auto
        threshold: 5%
    patch:
      default:
        target: auto
        threshold: 5%

comment:
  layout: "reach,diff,flags,files"
  behavior: default
  require_changes: true

ignore:
  - "examples/**"
  - "**/*_test.go"
  - "cmd/sqlguard/main.go"
